<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
     
    <!-- Bootstrap 4 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <!-- SweetAlert2 CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <!-- Bootstrap 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <!-- Config and User JS -->
    <script src="js/config.js"></script>
    <script src="js/user.js"></script>
    <style>
        /* Login Page Custom Styles */
        body.login-page,
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .login-container {
            background: rgba(74, 222, 128, 0.1);
            padding: 3rem 2rem;
            border-radius: 25px;
            border: 1px solid rgba(74, 222, 128, 0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .login-container h2 {
            color: #4ade80;
            margin-bottom: 2rem;
            font-weight: 600;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            color: #4ade80;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100% !important;
            padding: 0.8rem 1rem;
            border-radius: 15px;
            border: 1px solid rgba(74, 222, 128, 0.3);
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #4ade80;
            box-shadow: 0 0 0 0.2rem rgba(74, 222, 128, 0.25);
            background: rgba(255,255,255,0.15);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .btn-primary {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #4ade80, #22c55e);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74, 222, 128, 0.3);
            background: linear-gradient(45deg, #22c55e, #16a34a);
        }

        .btn-primary:focus {
            box-shadow: 0 0 0 0.2rem rgba(74, 222, 128, 0.5);
        }

        .login-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }

        .login-footer a {
            color: #4ade80;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #22c55e;
            text-decoration: underline;
        }

        #loginMessage {
            margin-top: 1rem;
            font-size: 0.95rem;
        }

       
       

        @media (max-width: 576px) {
            .login-container {
                padding: 2rem 1.5rem;
                width: 95%;
            }
            
            .login-container h2 {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            name="loginEmail"
            class="form-control"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            name="loginPassword"
            class="form-control"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="button" class="btn btn-primary btn-block" id="loginBtn">
          Login
        </button>
        <div class="login-footer">
          <a href="register.html">Don't have an account? Register</a>
        </div>
      </form>
    </div>

    <script>
      function redirectIfLoggedIn() {
        const token = sessionStorage.getItem('access_token');
        if (token) {
          Swal.fire({
            icon: 'info',
            title: 'Already Logged In',
            text: 'You are already logged in.',
            showConfirmButton: true
          }).then(() => {
            window.location.href = 'index.html';
          });
        }
      }
      $(document).ready(function () {
        redirectIfLoggedIn();
        
      });
    </script>
    <div id="header"></div>

<script>
  fetch("/header.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
</script>

  </body>
</html>
