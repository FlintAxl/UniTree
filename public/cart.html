<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - UniTree</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <br><br><br><br>
    <header class="header">
        <nav class="nav">
            <div class="logo">UniTree</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="#" style="color: #999; cursor: not-allowed;" title="Coming soon">Reviews</a></li>
                <li><a href="#" style="color: #999; cursor: not-allowed;" title="Coming soon">Pet</a></li>
            </ul>
            <div class="nav-actions">
                <div class="search-box">
                    <input type="text" placeholder="Search products..." id="searchInput">
                    <span></span>
                </div>
                <a href="cart.html" class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <div class="dropdown" id="joinNowSection">
                    <button class="btn btn-primary dropdown-toggle" id="joinNowBtn">Join Now</button>
                    <div class="dropdown-menu" id="joinDropdown">
                        <a href="login.html">Log In</a>
                        <a href="register.html">Register</a>
                    </div>
                </div>
                <div class="dropdown" id="userProfileSection" style="display: none;">
                    <button class="btn btn-primary dropdown-toggle" id="userProfileBtn">
                        <i class="fas fa-user"></i>
                        <span id="usernameDisplay"></span>
                    </button>
                    <div class="dropdown-menu" id="userDropdown">
                        <a href="profile.html">Profile</a>
                        <a href="orders.html">My Orders</a>
                        <a href="settings.html">Settings</a>
                        <a href="#" id="logoutBtn">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="cart-container">
        <div class="cart-header">
            <h1>Your Shopping Cart</h1>
            <p>Review and manage your items before checkout</p>
        </div>
        
        <div class="cart-content">
            <div class="cart-items" id="cartItems">
                <!-- Items will be rendered by cart.js -->
            </div>
            
            <div class="cart-summary">
                <h3 class="summary-title">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₱0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="total">₱0.00</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn" disabled>
                    <i class="fas fa-lock"></i>
                    Secure Checkout
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <script src="js/config.js"></script>
    <script src="js/user.js"></script>
    <script src="js/cart.js"></script> <!-- ✅ All cart logic -->
</body>
</html>
